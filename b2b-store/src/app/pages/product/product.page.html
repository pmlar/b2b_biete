<app-header></app-header>
<ion-content *ngIf="product as p">
  <div class="container product">
    <ion-grid>
      <ion-row>
        <ion-col size="12" sizeMd="6">
          <div class="gallery">
            <ion-img *ngFor="let img of p.images" [src]="img" [alt]="p.title"></ion-img>
          </div>
        </ion-col>
        <ion-col size="12" sizeMd="6">
          <h1>{{ p.title }}</h1>
          <p class="subtitle">{{ p.subtitle }}</p>
          <div class="price-row">
            <span class="price">{{ p.price | currency:EUR }}</span>
            <app-quantity-stepper></app-quantity-stepper>
          </div>
          <ion-button expand="block" color="dark">Añadir al carrito</ion-button>
          <ion-card>
            <ion-card-header>
              <ion-card-title>Descripción</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              {{ p.description }}
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
<app-footer></app-footer>
