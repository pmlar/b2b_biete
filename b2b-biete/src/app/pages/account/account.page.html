<app-header-toolbar title="Cuenta"></app-header-toolbar>

<ion-content>
  <ion-list inset *ngIf="user; else loginPrompt">
    <ion-item>
      <ion-label>
        <h2>{{ user?.name }}</h2>
        <p>{{ user?.email }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ng-template #loginPrompt>
    <ion-text color="medium">
      <p style="padding: var(--space-6); text-align:center;">Inicia sesión para ver tu cuenta</p>
    </ion-text>
  </ng-template>
</ion-content>

<app-footer-tabs></app-footer-tabs>
