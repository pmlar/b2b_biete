<app-header-toolbar title="Carrito"></app-header-toolbar>

<ion-content>
  <ion-list *ngIf="items.length; else empty">
    <ion-item-sliding *ngFor="let item of items">
      <ion-item>
        <ion-thumbnail slot="start">
          <ion-img [src]="item.imageUrl"></ion-img>
        </ion-thumbnail>
        <ion-label>
          <h3>{{ item.name }}</h3>
          <p>{{ item.price | currency:'EUR' }} × {{ item.quantity }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="remove(item.productId)">
          Eliminar
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ng-template #empty>
    <ion-text color="medium">
      <p style="padding: var(--space-6); text-align:center;">Tu carrito está vacío</p>
    </ion-text>
  </ng-template>

  <ion-footer *ngIf="items.length">
    <ion-toolbar>
      <ion-title>Total: {{ total() | currency:'EUR' }}</ion-title>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="goCheckout()">Finalizar compra</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-footer>
</ion-content>

<app-footer-tabs></app-footer-tabs>
